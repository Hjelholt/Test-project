<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tilmeld deltagelse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
      color: #1a1a2e;
    }

    .top-bar {
      width: 100%;
      max-width: 560px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn-top-link {
      padding: 7px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: .825rem;
      font-weight: 600;
      color: #6b7280;
      text-decoration: none;
      background: #fff;
      transition: border-color .15s, color .15s;
    }
    .btn-top-link:hover { border-color: #4f46e5; color: #4f46e5; }

    .btn-top-primary {
      padding: 7px 14px;
      border: 2px solid #4f46e5;
      border-radius: 8px;
      font-size: .825rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      background: #4f46e5;
      transition: background .15s;
    }
    .btn-top-primary:hover { background: #4338ca; }

    .lang-toggle {
      display: flex;
      gap: 4px;
      background: #fff;
      border-radius: 10px;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(79,70,229,.10);
    }

    .lang-btn {
      background: none;
      border: none;
      border-radius: 7px;
      padding: 5px 10px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      color: #6b7280;
      transition: background .15s, color .15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .lang-btn .flag { font-size: 1.1rem; }
    .lang-btn:hover { background: #f3f4f6; }
    .lang-btn.active { background: #4f46e5; color: #fff; }

    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #4f46e5; }
    header p { margin-top: 6px; color: #6b7280; font-size: 1rem; }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(79,70,229,.10);
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    .section-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .events-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .event-option { position: relative; }
    .event-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }

    .event-card {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s, box-shadow .15s;
      user-select: none;
    }

    .event-option input:checked + .event-card {
      border-color: #4f46e5;
      background: #eef2ff;
      box-shadow: 0 0 0 3px rgba(79,70,229,.15);
    }

    .event-card:hover { border-color: #a5b4fc; }
    .event-card .event-name { font-weight: 600; font-size: .95rem; color: #1a1a2e; }
    .event-card .event-meta { font-size: .8rem; color: #6b7280; display: flex; align-items: center; gap: 4px; }
    .event-card .event-emoji { font-size: 1.4rem; margin-bottom: 4px; }
    .event-card .event-details { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
    .event-card .event-detail { font-size: .78rem; color: #6b7280; display: flex; align-items: center; gap: 4px; }
    .event-card .event-detail svg { flex-shrink: 0; opacity: .6; }

    .no-events {
      text-align: center;
      padding: 24px;
      color: #9ca3af;
      font-size: .9rem;
      border: 2px dashed #e5e7eb;
      border-radius: 12px;
      margin-bottom: 28px;
    }

    .skeleton-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .skeleton {
      height: 90px;
      background: linear-gradient(90deg, #f3f4f6 25%, #e9ebf0 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 12px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .fields { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
    }

    input[type="text"], input[type="tel"] {
      padding: 11px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: .95rem;
      font-family: inherit;
      color: #1a1a2e;
      outline: none;
      transition: border-color .15s;
    }

    input[type="text"]:focus, input[type="tel"]:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }

    input.error { border-color: #ef4444; }
    .field-error { font-size: .78rem; color: #ef4444; margin-top: -4px; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button[type="submit"]:hover { background: #4338ca; }
    button[type="submit"]:active { transform: scale(.98); }
    button[type="submit"]:disabled { background: #a5b4fc; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .success-box { display: none; text-align: center; padding: 40px 24px; }

    .success-box .checkmark {
      width: 64px; height: 64px;
      background: #4f46e5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .success-box .checkmark svg { width: 32px; height: 32px; }
    .success-box h2 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 8px; }
    .success-box p { color: #6b7280; font-size: .95rem; margin-bottom: 24px; }

    .success-box .highlight {
      display: inline-block;
      background: #eef2ff;
      color: #4f46e5;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      margin: 0 4px;
    }

    .btn-secondary {
      display: inline-block;
      padding: 10px 24px;
      border: 2px solid #4f46e5;
      color: #4f46e5;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      transition: background .15s, color .15s;
      text-decoration: none;
    }

    .btn-secondary:hover { background: #4f46e5; color: #fff; }

    footer { margin-top: 24px; text-align: center; font-size: .8rem; color: #9ca3af; }
    footer a { color: #6b7280; text-decoration: none; }
    footer a:hover { color: #4f46e5; }

    @media (max-width: 420px) {
      .events-grid, .skeleton-grid { grid-template-columns: 1fr; }
      .card { padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="lang-toggle">
      <button class="lang-btn" id="btn-da" onclick="setLang('da')">
        <span class="flag">🇩🇰</span> DA
      </button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">
        <span class="flag">🇬🇧</span> EN
      </button>
    </div>
    <div style="display:flex;gap:8px">
      <a href="/dashboard.html" class="btn-top-link" data-i18n="btnSignIn"></a>
      <a href="/dashboard.html?tab=register" class="btn-top-primary" data-i18n="btnCreateAccount"></a>
    </div>
  </div>

  <header>
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
  </header>

  <div class="card">
    <form id="regForm">
      <p class="section-label" data-i18n="chooseEvent"></p>
      <div id="eventsContainer">
        <div class="skeleton-grid">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>
      <p id="eventError" class="field-error" style="margin-bottom:16px;display:none;" data-i18n="errorEvent"></p>

      <div class="fields">
        <label>
          <span data-i18n="labelName"></span>
          <input type="text" id="name" data-i18n-placeholder="placeholderName" autocomplete="name" />
          <span class="field-error" id="nameError" style="display:none;" data-i18n="errorName"></span>
        </label>
        <label>
          <span data-i18n="labelPhone"></span>
          <input type="tel" id="phone" placeholder="+45 00 00 00 00" autocomplete="tel" />
          <span class="field-error" id="phoneError" style="display:none;" data-i18n="errorPhone"></span>
        </label>
      </div>

      <button type="submit" id="submitBtn" data-i18n="btnRegister"></button>
    </form>

    <div class="success-box" id="successBox">
      <div class="checkmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2 data-i18n="successTitle"></h2>
      <p><span data-i18n="successMsg"></span> <span class="highlight" id="confirmedEvent"></span></p>
      <button class="btn-secondary" onclick="resetForm()" data-i18n="btnAnother"></button>
    </div>
  </div>

  <footer>
    <a href="/dashboard.html">My Events</a> &nbsp;·&nbsp; <a href="/admin.html">Admin panel</a>
  </footer>

  <script>
    // ── Translations ──────────────────────────────────────────
    const t = {
      da: {
        btnSignIn:        'Log ind',
        btnCreateAccount: 'Opret konto',
        title:            'Tilmeld deltagelse',
        subtitle:         'Vælg en begivenhed og udfyld dine oplysninger',
        chooseEvent:      'Vælg en begivenhed',
        labelName:        'Fulde navn',
        placeholderName:  'Dit navn',
        labelPhone:       'Telefonnummer',
        btnRegister:      'Tilmeld',
        btnRegistering:   'Tilmelder...',
        btnAnother:       'Tilmeld en anden',
        successTitle:     'Du er tilmeldt!',
        successMsg:       'Vi ses til',
        errorEvent:       'Vælg venligst en begivenhed.',
        errorName:        'Indtast venligst dit fulde navn.',
        errorPhone:       'Indtast venligst et gyldigt telefonnummer.',
        errorLoad:        'Kunne ikke hente begivenheder. Prøv at genindlæse siden.',
        noEvents:         'Ingen begivenheder endnu.\nBed arrangøren om at tilføje begivenheder.',
        errorSubmit:      'Tilmelding mislykkedes. Prøv igen.',
      },
      en: {
        btnSignIn:        'Sign in',
        btnCreateAccount: 'Create account',
        title:            'Register Attendance',
        subtitle:         'Pick an event and fill in your details',
        chooseEvent:      'Choose an event',
        labelName:        'Full name',
        placeholderName:  'Your name',
        labelPhone:       'Phone number',
        btnRegister:      'Register',
        btnRegistering:   'Registering...',
        btnAnother:       'Register another person',
        successTitle:     "You're registered!",
        successMsg:       'See you at',
        errorEvent:       'Please select an event.',
        errorName:        'Please enter your name.',
        errorPhone:       'Please enter a valid phone number.',
        errorLoad:        'Could not load events. Please refresh.',
        noEvents:         'No events added yet.\nAsk the organiser to add events via the admin panel.',
        errorSubmit:      'Registration failed. Please try again.',
      }
    };

    let lang = localStorage.getItem('lang') || 'da';
    let events = [];

    function setLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      document.documentElement.lang = l;
      document.title = t[l].title;

      // Update active button
      document.getElementById('btn-da').classList.toggle('active', l === 'da');
      document.getElementById('btn-en').classList.toggle('active', l === 'en');

      // Update all data-i18n elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[l][key] !== undefined) el.textContent = t[l][key];
      });

      // Update placeholders
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (t[l][key] !== undefined) el.placeholder = t[l][key];
      });

      // Re-render events so "no events" message is in correct language
      renderEvents();
    }

    // ── Utilities ─────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString(lang === 'da' ? 'da-DK' : 'en-GB',
        { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':');
      return `${h}:${m}`;
    }

    // ── Events ────────────────────────────────────────────────
    async function loadEvents() {
      try {
        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
          const res = await fetch(`/api/events/by-token?token=${encodeURIComponent(code)}`);
          if (!res.ok) throw new Error('not found');
          events = [await res.json()];
        } else {
          const res = await fetch('/api/events');
          events = await res.json();
        }
        renderEvents();
        // Pre-select the only event when arriving via private link
        if (events.length === 1) {
          const radio = document.getElementById(`ev-${events[0].id}`);
          if (radio) radio.checked = true;
        }
      } catch {
        document.getElementById('eventsContainer').innerHTML =
          `<div class="no-events">${escHtml(t[lang].errorLoad)}</div>`;
      }
    }

    function renderEvents() {
      const container = document.getElementById('eventsContainer');

      if (events.length === 0) {
        const lines = t[lang].noEvents.split('\n');
        container.innerHTML =
          `<div class="no-events">${lines.map(escHtml).join('<br>')}</div>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'events-grid';

      events.forEach(ev => {
        const opt = document.createElement('div');
        opt.className = 'event-option';
        const details = [];
        if (ev.date || ev.time) {
          const dateStr = ev.date ? formatDate(ev.date) : '';
          const timeStr = ev.time ? formatTime(ev.time) : '';
          details.push(`<span class="event-detail">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${escHtml([dateStr, timeStr].filter(Boolean).join(' · '))}
          </span>`);
        }
        if (ev.location) {
          details.push(`<span class="event-detail">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${escHtml(ev.location)}
          </span>`);
        }

        opt.innerHTML = `
          <input type="radio" name="event" id="ev-${ev.id}" value="${ev.id}" />
          <label class="event-card" for="ev-${ev.id}">
            <span class="event-emoji">${escHtml(ev.emoji)}</span>
            <span class="event-name">${escHtml(ev.name)}</span>
            ${details.length ? `<div class="event-details">${details.join('')}</div>` : ''}
          </label>`;
        grid.appendChild(opt);
      });

      container.innerHTML = '';
      container.appendChild(grid);
    }

    // ── Form submission ───────────────────────────────────────
    document.getElementById('regForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      let valid = true;

      const selectedEvent = document.querySelector('input[name="event"]:checked');
      const eventError = document.getElementById('eventError');
      if (!selectedEvent) { eventError.style.display = 'block'; valid = false; }
      else { eventError.style.display = 'none'; }

      const nameInput = document.getElementById('name');
      const nameError = document.getElementById('nameError');
      if (!nameInput.value.trim()) {
        nameInput.classList.add('error'); nameError.style.display = 'block'; valid = false;
      } else { nameInput.classList.remove('error'); nameError.style.display = 'none'; }

      const phoneInput = document.getElementById('phone');
      const phoneError = document.getElementById('phoneError');
      if (!phoneInput.value.trim() || !/^\+?[\d\s\-().]{5,20}$/.test(phoneInput.value.trim())) {
        phoneInput.classList.add('error'); phoneError.style.display = 'block'; valid = false;
      } else { phoneInput.classList.remove('error'); phoneError.style.display = 'none'; }

      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = `<div class="spinner"></div> ${escHtml(t[lang].btnRegistering)}`;

      try {
        const res = await fetch('/api/registrations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            eventId: selectedEvent.value,
            name: nameInput.value.trim(),
            phone: phoneInput.value.trim()
          })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || t[lang].errorSubmit);
        }

        const ev = events.find(e => e.id === selectedEvent.value);
        document.getElementById('confirmedEvent').textContent = ev.name;
        document.getElementById('regForm').style.display = 'none';
        document.getElementById('successBox').style.display = 'block';
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.textContent = t[lang].btnRegister;
      }
    });

    function resetForm() {
      document.getElementById('regForm').reset();
      document.getElementById('regForm').style.display = 'block';
      document.getElementById('successBox').style.display = 'none';
      document.querySelectorAll('.field-error').forEach(el => el.style.display = 'none');
      document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.textContent = t[lang].btnRegister;
    }

    // ── Init ─────────────────────────────────────────────────
    setLang(lang);
    loadEvents();
  </script>
</body>
</html>
