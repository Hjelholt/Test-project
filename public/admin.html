<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      color: #1a1a2e;
    }

    /* ── Login overlay ──────────────────────────────────────── */
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(79,70,229,.15);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-logo {
      width: 56px; height: 56px;
      background: #4f46e5;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .login-logo svg { width: 28px; height: 28px; }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .login-card p {
      font-size: .875rem;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .login-fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: left;
      margin-bottom: 20px;
    }

    .login-fields label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: .8rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .login-fields input {
      padding: 11px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: .95rem;
      font-family: inherit;
      color: #1a1a2e;
      outline: none;
      transition: border-color .15s;
    }

    .login-fields input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }

    .login-fields input.error { border-color: #ef4444; }

    .login-error {
      font-size: .825rem;
      color: #ef4444;
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
      text-align: left;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { background: #4338ca; }
    .btn-login:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* ── Main page ──────────────────────────────────────────── */
    #adminPage { display: none; padding: 40px 16px; }

    .page { max-width: 900px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    header h1 { font-size: 1.7rem; font-weight: 700; color: #4f46e5; }

    .back-link {
      font-size: .875rem;
      color: #6b7280;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-link:hover { color: #4f46e5; }

    .btn-logout {
      padding: 8px 16px;
      border: 2px solid #e5e7eb;
      background: #fff;
      color: #6b7280;
      border-radius: 8px;
      font-size: .825rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 28px;
    }

    @media (max-width: 640px) { .grid-two { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(79,70,229,.10);
      padding: 24px;
    }

    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #374151; }

    .event-form { display: flex; flex-direction: column; gap: 12px; }

    .event-form label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: .8rem;
      font-weight: 500;
      color: #6b7280;
    }

    .event-form input {
      padding: 9px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: .9rem;
      font-family: inherit;
      color: #1a1a2e;
      outline: none;
      transition: border-color .15s;
    }

    .event-form input:focus { border-color: #4f46e5; }

    .btn-primary {
      padding: 10px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    .events-list { display: flex; flex-direction: column; gap: 10px; }

    .event-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #f9fafb;
      border-radius: 10px;
      gap: 10px;
    }

    .event-item .ev-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .event-item .ev-emoji { font-size: 1.3rem; flex-shrink: 0; }
    .event-item .ev-name { font-weight: 600; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-item .ev-date { font-size: .78rem; color: #9ca3af; }

    .badge {
      background: #eef2ff;
      color: #4f46e5;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: .75rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }

    .btn-icon:hover { color: #ef4444; background: #fee2e2; }

    .empty-state { text-align: center; padding: 20px; color: #9ca3af; font-size: .85rem; }

    .table-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(79,70,229,.10); padding: 24px; }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .table-header h2 { font-size: 1rem; font-weight: 600; color: #374151; }

    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .filter-row select {
      padding: 7px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: .85rem;
      font-family: inherit;
      color: #374151;
      outline: none;
      cursor: pointer;
    }

    .filter-row select:focus { border-color: #4f46e5; }
    .count-badge { font-size: .8rem; color: #6b7280; }

    .btn-danger-outline {
      padding: 7px 14px;
      border: 2px solid #ef4444;
      color: #ef4444;
      background: none;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .btn-danger-outline:hover { background: #ef4444; color: #fff; }

    table { width: 100%; border-collapse: collapse; font-size: .875rem; }

    th {
      text-align: left;
      padding: 10px 14px;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #9ca3af;
      border-bottom: 2px solid #f3f4f6;
    }

    td { padding: 12px 14px; border-bottom: 1px solid #f3f4f6; color: #374151; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf9; }
    .td-name { font-weight: 600; color: #1a1a2e; }
    .td-time { color: #9ca3af; font-size: .8rem; }
    .no-regs { text-align: center; padding: 40px; color: #9ca3af; }
    .overflow-x { overflow-x: auto; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: .875rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <!-- ── Login overlay ─────────────────────────────────────── -->
  <div id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Admin Login</h1>
      <p>Sign in to manage events and view registrations</p>

      <form id="loginForm">
        <div class="login-fields">
          <label>
            Username
            <input type="text" id="loginUser" autocomplete="username" placeholder="Username" />
          </label>
          <label>
            Password
            <input type="password" id="loginPass" autocomplete="current-password" placeholder="Password" />
          </label>
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
      </form>
    </div>
  </div>

  <!-- ── Admin page ─────────────────────────────────────────── -->
  <div id="adminPage">
    <div class="page">
      <header>
        <div class="header-left">
          <h1>Admin Panel</h1>
          <a href="/index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Registration page
          </a>
        </div>
        <button class="btn-logout" onclick="logout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </header>

      <div class="grid-two">
        <!-- Add event form -->
        <div class="card">
          <h2>Add Event</h2>
          <form class="event-form" id="eventForm">
            <label>
              Event name *
              <input type="text" id="evName" placeholder="e.g. Mia's Birthday" required />
            </label>
            <label>
              Date
              <input type="date" id="evDate" />
            </label>
            <label>
              Emoji icon
              <input type="text" id="evEmoji" placeholder="🎉" maxlength="4" />
            </label>
            <button type="submit" class="btn-primary" id="addEventBtn">Add Event</button>
          </form>
        </div>

        <!-- Events list -->
        <div class="card">
          <h2>Events</h2>
          <div class="events-list" id="eventsList">
            <div class="empty-state">Loading...</div>
          </div>
        </div>
      </div>

      <!-- Registrations table -->
      <div class="table-card">
        <div class="table-header">
          <h2>Registrations <span class="count-badge" id="countBadge"></span></h2>
          <div class="filter-row">
            <select id="filterEvent" onchange="loadRegistrations()">
              <option value="">All events</option>
            </select>
            <button class="btn-danger-outline" onclick="clearFiltered()">Clear filtered</button>
          </div>
        </div>
        <div class="overflow-x">
          <table id="regTable" style="display:none">
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Event</th>
                <th>Registered</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="regBody"></tbody>
          </table>
          <div class="no-regs" id="noRegs">No registrations yet.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatDateTime(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' })
        + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    }

    // ── Auth ──────────────────────────────────────────────────
    async function checkAuth() {
      const res = await fetch('/api/auth/status');
      const { authenticated } = await res.json();
      if (authenticated) showAdminPage();
    }

    function showAdminPage() {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      loadEvents();
      loadRegistrations();
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUser').value,
            password: document.getElementById('loginPass').value
          })
        });

        if (res.ok) {
          showAdminPage();
        } else {
          const { error } = await res.json();
          errEl.textContent = error || 'Login failed.';
          errEl.style.display = 'block';
          document.getElementById('loginPass').value = '';
        }
      } catch {
        errEl.textContent = 'Could not connect to server.';
        errEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.innerHTML = 'Sign in';
    });

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      document.getElementById('adminPage').style.display = 'none';
      document.getElementById('loginOverlay').style.display = 'flex';
      document.getElementById('loginForm').reset();
    }

    // ── Events ────────────────────────────────────────────────
    let events = [];

    async function loadEvents() {
      const res = await fetch('/api/events');
      events = await res.json();
      renderEventsList();
      rebuildFilterSelect();
    }

    function renderEventsList() {
      const list = document.getElementById('eventsList');

      if (events.length === 0) {
        list.innerHTML = '<div class="empty-state">No events yet. Add one!</div>';
        return;
      }

      list.innerHTML = '';
      events.forEach(ev => {
        const regCount = 0; // will be updated after regs load
        const item = document.createElement('div');
        item.className = 'event-item';
        item.id = `ev-item-${ev.id}`;
        item.innerHTML = `
          <div class="ev-info">
            <span class="ev-emoji">${escHtml(ev.emoji)}</span>
            <div>
              <div class="ev-name">${escHtml(ev.name)}</div>
              ${ev.date ? `<div class="ev-date">${formatDate(ev.date)}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge" id="badge-${ev.id}">0</span>
            <button class="btn-icon" onclick="deleteEvent('${ev.id}')" title="Delete event">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>`;
        list.appendChild(item);
      });
    }

    function rebuildFilterSelect() {
      const sel = document.getElementById('filterEvent');
      const cur = sel.value;
      sel.innerHTML = '<option value="">All events</option>';
      events.forEach(ev => {
        const opt = document.createElement('option');
        opt.value = ev.id;
        opt.textContent = ev.name;
        sel.appendChild(opt);
      });
      if (events.find(e => e.id === cur)) sel.value = cur;
    }

    function updateBadges(regs) {
      // Reset
      events.forEach(ev => {
        const badge = document.getElementById(`badge-${ev.id}`);
        if (badge) badge.textContent = '0';
      });
      // Count
      regs.forEach(r => {
        const badge = document.getElementById(`badge-${r.event_id}`);
        if (badge) badge.textContent = String(Number(badge.textContent) + 1);
      });
    }

    document.getElementById('eventForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('evName').value.trim();
      if (!name) return;

      const btn = document.getElementById('addEventBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      try {
        const res = await fetch('/api/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            date: document.getElementById('evDate').value || null,
            emoji: document.getElementById('evEmoji').value.trim() || '🎉'
          })
        });

        if (!res.ok) throw new Error();
        this.reset();
        await loadEvents();
        await loadRegistrations();
        showToast('Event added!');
      } catch {
        showToast('Failed to add event.');
      }

      btn.disabled = false;
      btn.innerHTML = 'Add Event';
    });

    async function deleteEvent(id) {
      if (!confirm('Delete this event? All registrations for it will also be removed.')) return;
      try {
        await fetch(`/api/events/${id}`, { method: 'DELETE' });
        await loadEvents();
        await loadRegistrations();
        showToast('Event deleted.');
      } catch {
        showToast('Failed to delete event.');
      }
    }

    // ── Registrations ─────────────────────────────────────────
    async function loadRegistrations() {
      const filter = document.getElementById('filterEvent').value;
      const url = filter ? `/api/registrations?eventId=${filter}` : '/api/registrations';

      try {
        const res = await fetch(url);
        if (res.status === 401) return;
        const regs = await res.json();
        renderTable(regs);

        // Fetch all regs for badge counts (regardless of filter)
        const allRes = await fetch('/api/registrations');
        const allRegs = await allRes.json();
        updateBadges(allRegs);
      } catch {
        // silently fail if not yet authenticated
      }
    }

    function renderTable(regs) {
      const tbody = document.getElementById('regBody');
      const noRegs = document.getElementById('noRegs');
      const count = document.getElementById('countBadge');

      count.textContent = `(${regs.length})`;

      if (regs.length === 0) {
        tbody.innerHTML = '';
        document.getElementById('regTable').style.display = 'none';
        noRegs.style.display = 'block';
        return;
      }

      document.getElementById('regTable').style.display = 'table';
      noRegs.style.display = 'none';

      tbody.innerHTML = regs.map(r => `
        <tr>
          <td class="td-name">${escHtml(r.name)}</td>
          <td><a href="tel:${escHtml(r.phone)}" style="color:#4f46e5;text-decoration:none">${escHtml(r.phone)}</a></td>
          <td>${escHtml(r.emoji || '🎉')} ${escHtml(r.event_name || '—')}</td>
          <td class="td-time">${formatDateTime(r.created_at)}</td>
          <td>
            <button class="btn-icon" onclick="deleteReg('${r.id}')" title="Remove">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </td>
        </tr>`).join('');
    }

    async function deleteReg(id) {
      if (!confirm('Remove this registration?')) return;
      await fetch(`/api/registrations/${id}`, { method: 'DELETE' });
      await loadRegistrations();
      showToast('Registration removed.');
    }

    async function clearFiltered() {
      const sel = document.getElementById('filterEvent');
      const filter = sel.value;
      const label = filter ? sel.options[sel.selectedIndex].text : 'all events';
      if (!confirm(`Remove all registrations for "${label}"?`)) return;

      if (filter) {
        await fetch(`/api/events/${filter}/registrations`, { method: 'DELETE' });
      } else {
        // Delete all: fetch all regs and delete event by event
        for (const ev of events) {
          await fetch(`/api/events/${ev.id}/registrations`, { method: 'DELETE' });
        }
      }

      await loadRegistrations();
      showToast('Registrations cleared.');
    }

    // ── Init ──────────────────────────────────────────────────
    checkAuth();
  </script>
</body>
</html>
